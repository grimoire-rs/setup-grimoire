name: test

on:
  push:
    branches: [main]
    paths-ignore: [site/**]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: ./
      - name: grim runs
        shell: bash
        run: |
          set -euo pipefail
          grim --version
          echo "reported: ${{ steps.setup.outputs.version }}"
